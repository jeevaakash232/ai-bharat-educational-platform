<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #4F46E5;
            color: white;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 { font-size: 48px; margin: 20px 0; }
        p { font-size: 24px; margin: 10px 0; }
        .box {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            margin: 20px;
            max-width: 400px;
        }
        button {
            background: #ef4444;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 20px;
            border-radius: 10px;
            margin: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>✅ IT WORKS!</h1>
    <p>If you see this, the server is working</p>
    <div class="box">
        <h2>Test Info</h2>
        <p><strong>Time:</strong> <span id="time"></span></p>
        <p><strong>Device:</strong> <span id="device"></span></p>
        <p><strong>Screen:</strong> <span id="screen"></span></p>
    </div>
    <button onclick="goToApp()">Go to Main App</button>
    <button onclick="clearCache()">Clear Cache</button>
    
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString();
        document.getElementById('device').textContent = /Mobile|Android|iPhone/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop';
        document.getElementById('screen').textContent = window.innerWidth + 'x' + window.innerHeight;
        
        function goToApp() {
            window.location.href = '/';
        }
        
        async function clearCache() {
            localStorage.clear();
            sessionStorage.clear();
            if ('caches' in window) {
                const names = await caches.keys();
                await Promise.all(names.map(n => caches.delete(n)));
            }
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                await Promise.all(regs.map(r => r.unregister()));
            }
            alert('Cache cleared! Redirecting...');
            window.location.href = '/';
        }
    </script>
</body>
</html>
