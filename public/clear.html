<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clearing Cache...</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .box {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 28px; margin-bottom: 20px; }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #msg { margin: 20px 0; font-size: 16px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔄 Clearing Cache</h1>
        <div class="spinner"></div>
        <div id="msg">Please wait...</div>
    </div>
    <script>
        const msg = document.getElementById('msg');
        
        async function clear() {
            try {
                msg.textContent = 'Clearing storage...';
                localStorage.clear();
                sessionStorage.clear();
                
                msg.textContent = 'Clearing caches...';
                if ('caches' in window) {
                    const names = await caches.keys();
                    await Promise.all(names.map(n => caches.delete(n)));
                }
                
                msg.textContent = 'Removing service workers...';
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(regs.map(r => r.unregister()));
                }
                
                msg.textContent = '✅ Done! Redirecting...';
                localStorage.setItem('app_version', '2.0.0');
                
                setTimeout(() => {
                    window.location.href = '/?t=' + Date.now();
                }, 1000);
            } catch(e) {
                msg.textContent = '✅ Done! Redirecting...';
                setTimeout(() => {
                    window.location.href = '/?t=' + Date.now();
                }, 1000);
            }
        }
        
        clear();
    </script>
</body>
</html>
