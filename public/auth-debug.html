<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Debug - EduLearn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            color: #333;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #4F46E5;
            margin-bottom: 20px;
        }
        h2 {
            color: #6366f1;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 20px;
        }
        .data-box {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .btn {
            background: #4F46E5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .btn:hover {
            background: #4338ca;
        }
        .btn.danger {
            background: #ef4444;
        }
        .btn.danger:hover {
            background: #dc2626;
        }
        .status {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .status.success {
            background: #d1fae5;
            color: #065f46;
        }
        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }
        .status.info {
            background: #dbeafe;
            color: #1e40af;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Authentication Debug Tool</h1>
        <p style="margin-bottom: 20px; color: #666;">Check and manage authentication data in localStorage</p>
        
        <div id="status"></div>
        
        <div>
            <button class="btn" onclick="loadData()">🔄 Refresh Data</button>
            <button class="btn" onclick="clearCurrentUser()">🚪 Logout (Clear Current User)</button>
            <button class="btn danger" onclick="clearAllData()">🗑️ Clear All Auth Data</button>
            <button class="btn" onclick="goToApp()">🏠 Go to App</button>
        </div>
        
        <h2>📊 Current User (edulearn_user)</h2>
        <div id="currentUser" class="data-box">Loading...</div>
        
        <h2>👥 Registered Users (registeredUsers)</h2>
        <div id="registeredUsers" class="data-box">Loading...</div>
        
        <h2>📝 All localStorage Keys</h2>
        <div id="allKeys" class="data-box">Loading...</div>
    </div>

    <script>
        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }
        
        function loadData() {
            // Current User
            const currentUser = localStorage.getItem('edulearn_user');
            const currentUserDiv = document.getElementById('currentUser');
            if (currentUser) {
                try {
                    const parsed = JSON.parse(currentUser);
                    currentUserDiv.textContent = JSON.stringify(parsed, null, 2);
                } catch (e) {
                    currentUserDiv.textContent = 'Error parsing: ' + currentUser;
                }
            } else {
                currentUserDiv.textContent = 'No current user (not logged in)';
            }
            
            // Registered Users
            const registeredUsers = localStorage.getItem('registeredUsers');
            const registeredUsersDiv = document.getElementById('registeredUsers');
            if (registeredUsers) {
                try {
                    const parsed = JSON.parse(registeredUsers);
                    registeredUsersDiv.textContent = JSON.stringify(parsed, null, 2);
                } catch (e) {
                    registeredUsersDiv.textContent = 'Error parsing: ' + registeredUsers;
                }
            } else {
                registeredUsersDiv.textContent = 'No registered users found';
            }
            
            // All Keys
            const allKeysDiv = document.getElementById('allKeys');
            const keys = Object.keys(localStorage);
            if (keys.length > 0) {
                let output = 'Total keys: ' + keys.length + '\n\n';
                keys.forEach(key => {
                    const value = localStorage.getItem(key);
                    const preview = value.length > 100 ? value.substring(0, 100) + '...' : value;
                    output += `${key}: ${preview}\n\n`;
                });
                allKeysDiv.textContent = output;
            } else {
                allKeysDiv.textContent = 'localStorage is empty';
            }
            
            showStatus('Data refreshed successfully', 'success');
        }
        
        function clearCurrentUser() {
            localStorage.removeItem('edulearn_user');
            showStatus('Current user cleared (logged out)', 'success');
            loadData();
        }
        
        function clearAllData() {
            if (confirm('Are you sure you want to clear ALL authentication data? This will delete all registered users!')) {
                localStorage.removeItem('edulearn_user');
                localStorage.removeItem('registeredUsers');
                showStatus('All authentication data cleared', 'success');
                loadData();
            }
        }
        
        function goToApp() {
            window.location.href = '/';
        }
        
        // Load data on page load
        loadData();
    </script>
</body>
</html>
